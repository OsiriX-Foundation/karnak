#  --------------------------------------------------------
#  Karnak Application Profiles
#  --------------------------------------------------------
name: KARNAK-Profile
environment: LOCAL
karnakadmin: ${KARNAK_ADMIN:admin}
karnakpassword: ${KARNAK_PASSWORD:karnak}
karnakpostgreskey: ${DB_ENCRYPTION_KEY}

# - Logs
logging:
  level:
    org:
      springframework: INFO
      karnak: INFO
      hibernate:
        orm:
          # Suppress WARN of HHH90006001 in Hibernate 6
          incubating: ERROR
      atmosphere:
         cpr:
           # Suppress WARN  a.c.c.AtmosphereFramework - No BroadcasterCache configured
           AtmosphereFramework: ERROR
    com:
      vaadin:
        copilot:
          # Copilot's release-note fetch fails behind TLS-inspecting proxies (PKIX
          # path building failed). The call is cosmetic, so silence its logger to
          # drop the noisy stack trace.
          VersionReleaseNoteHandler: "OFF"
# Dev-mode Copilot (Vaadin dev tools). Disabled: a browser tab still holding a
# Copilot connection after a server restart sends a copilot-* push message for
# which the server has no CopilotSession, so Copilot.handleMessage throws
# CopilotException ("No CopilotSession found for the current VaadinSession"),
# surfaced as a WARN by Atmosphere's DefaultWebSocketProcessor. Turning Copilot
# off makes handleConnect/handleMessage return early so the message is never
# handled. Copilot is a dev-only tool and unused here.
vaadin:
  copilot:
    enable: false
server:
  port: 8081
  servlet:
    session:
      persistent: false
  forward-headers-strategy: NATIVE
spring:
  application:
    name: karnak
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  profiles:
    active: redis
  datasource:
    url: 'jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:karnak}'
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:karnak}
    password: ${DB_PASSWORD:karnak}
    hikari:
      pool-name: karnak
      leak-detection-threshold: 0
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 270000 # 4 minutes 30 secondes
      validation-timeout: 3000
      connection-test-query: SELECT 1
      connection-init-sql: select set_config('encryption.key', '${DB_ENCRYPTION_KEY}', false)
  mustache:
    check-template-location: false
  jpa:
    hibernate:
      # First time to create the db the value must be: create
      ddl-auto: none
    generate-ddl: false
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        #  To still use the unique hibernate_sequence, otherwise we should create a sequence table_name_seq for each table
        id:
          db_structure_naming_strategy: legacy
        boot:
          use_jdbc_metadata_defaults: false
        jdbc:
          lob:
            non_contextual_creation: true
monitoring:
  # Maximum number of days in the monitoring history
  max-history-days: 30
cache-api:
  # Cache Time to leave in minutes for API calls
  ttl: 15

mail:
  sender: karnak@kheops.online

conformance-report:
  # A study report is flushed and emailed when no new instance arrived for this period
  idle-timeout-seconds: 300
  # Safety cap: a study trickling in for longer than this is flushed anyway
  max-study-lifetime-seconds: 14400

dicom-tools:
  # Timeouts used by the DICOM Tools Echo and Monitor views (milliseconds)
  echo:
    # C-ECHO TCP connection timeout
    connect-timeout-ms: 3000
    # C-ECHO association acceptance timeout
    accept-timeout-ms: 5000
  network:
    # Per-reply timeout passed to the ping command
    ping-timeout-ms: 3000
    # TCP timeout for the DICOM port reachability probe
    port-timeout-ms: 3000
  web:
    # Connect / TLS / HTTP timeout for the DICOMweb (STOW-RS) reachability probe
    timeout-ms: 5000
