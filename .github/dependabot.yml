version: 2
updates:
  # Keep pinned GitHub Actions SHAs (and their version comments) up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"

  # Maven dependencies (single root pom).
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
    groups:
      maven:
        patterns:
          - "*"

  # Base image of the published Docker image (built by maven.yml).
  - package-ecosystem: docker
    directory: /src/main/docker
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      docker:
        patterns:
          - "*"