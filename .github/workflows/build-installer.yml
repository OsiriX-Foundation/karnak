name: Build installers
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    env:
      NAME: "Karnak"
      IDENTIFIER: "org.karnak.launcher"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, platform: arm64, wsystem: macosx, warc: aarch64 }
          - { os: windows-latest, platform: x64, wsystem: windows, warc: x86-64 }
          - { os: ubuntu-latest, platform: x64, wsystem: linux, warc: x86-64 }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Import Developer Certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        if: matrix.wsystem == 'macosx'
        id: cert
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_DEVELOPMENT }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Import Installer Certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        if: matrix.wsystem == 'macosx'
        with:
          create-keychain: "false"
          keychain-password: ${{ steps.cert.outputs.keychain-password }}
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_INSTALLER }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build with Maven
        shell: bash
        env:
          MAC_DEVELOPER_ID: ${{ secrets.MACOS__DEVELOPER_ID }}
        run: |
          mvn -B -Pportable clean install

      - name: Verify package folder was resolved
        shell: bash
        run: |
          if [ -z "${APP_PACKAGE_FOLDER:-}" ] || [ ! -d "target/${APP_PACKAGE_FOLDER}" ]; then
            echo "::error::APP_PACKAGE_FOLDER was not set by the portable build (got '${APP_PACKAGE_FOLDER:-<empty>}')."
            exit 1
          fi
          echo "Packaged into target/${APP_PACKAGE_FOLDER}"

      - name: Zip app for notarization
        if: matrix.wsystem == 'macosx'
        run: |
          cd "target/${{ env.APP_PACKAGE_FOLDER }}"
          /usr/bin/ditto -c -k --keepParent "Karnak.app" "Karnak.zip"

      - name: Notarize Release Build
        if: matrix.wsystem == 'macosx'
        env:
          APPLE_ID: ${{ secrets.APPLE_DEVELOPER_AC_USERNAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.KARNAK_PWD }}
        run: |
          xcrun notarytool submit \
            "target/${{ env.APP_PACKAGE_FOLDER }}/Karnak.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple Release Build
        if: matrix.wsystem == 'macosx'
        run: |
          xcrun stapler staple "target/${{ env.APP_PACKAGE_FOLDER }}/Karnak.app"
          rm "target/${{ env.APP_PACKAGE_FOLDER }}/Karnak.zip"

      - name: Upload the packaged artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.APP_PACKAGE_FOLDER }}
          path: target/${{ env.APP_PACKAGE_FOLDER }}
          compression-level: '9'
          if-no-files-found: error
          retention-days: 30
