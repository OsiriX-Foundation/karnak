name: Build
permissions:
  contents: read
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    types: [ opened, synchronize, reopened ]
# Cancel superseded runs on the same branch/PR; the latest push is the only one worth building.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PUSH_PACKAGES: ${{ github.event_name == 'push' }}
    steps:
      - name: Setup NODE
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK for compilation
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - name: Build and test
        run: mvn -Pcoverage -B verify
      # Sonar analysis runs in a separate workflow_run-triggered workflow (sonar.yml) so it
      # has access to P_SONAR_TOKEN even for pull requests from forks and Dependabot (where
      # secrets are withheld from the triggering workflow) and never exposes secrets to PR code.
      - name: Save PR context for Sonar analysis
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p pr-context
          echo "${{ github.event.pull_request.number }}" > pr-context/pr_number
          echo "${{ github.event.pull_request.head.ref }}" > pr-context/head_ref
          echo "${{ github.event.pull_request.base.ref }}" > pr-context/base_ref
      - name: Upload PR context
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: pr-context
          path: pr-context/
          retention-days: 1
      # Build Docker image and push it to Docker Hub
      - name: Build the spring app
        if: ${{ env.PUSH_PACKAGES }}
        shell: bash
        run: mvn -B clean install -P production -Dmaven.test.skip=true
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: osirixfoundation/karnak
      - name: Set up QEMU
        if: ${{ env.PUSH_PACKAGES }}
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        if: ${{ env.PUSH_PACKAGES }}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to DockerHub
        if: ${{ env.PUSH_PACKAGES }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        if: ${{ env.PUSH_PACKAGES }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: src/main/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}