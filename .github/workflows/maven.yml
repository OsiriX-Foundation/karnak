name: Build
permissions:
  contents: read
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    types: [ opened, synchronize, reopened ]
# Cancel superseded runs on the same branch/PR; the latest push is the only one worth building.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Setup NODE
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Set up JDK for compilation
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - name: Build and test
        run: mvn -Pcoverage -B verify
      # Sonar analysis runs in a separate workflow_run-triggered workflow (sonar.yml) so it
      # has access to P_SONAR_TOKEN even for pull requests from forks and Dependabot (where
      # secrets are withheld from the triggering workflow) and never exposes secrets to PR code.
      - name: Save PR context for Sonar analysis
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p pr-context
          echo "${{ github.event.pull_request.number }}" > pr-context/pr_number
          echo "${{ github.event.pull_request.head.ref }}" > pr-context/head_ref
          echo "${{ github.event.pull_request.base.ref }}" > pr-context/base_ref
      - name: Upload PR context
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-context
          path: pr-context/
          retention-days: 1
      # Docker image build and push lives in docker-publish.yml, which runs only on
      # pushes to master and version tags (never on pull requests or other branches).